http:
  routers:
    tt-auth:
      rule: Host(`auth-beta.thun-tigers.net`) || Host(`auth.thun-tigers.net`)
      entryPoints:
        - web
      service: tt-auth

    tt-members:
      rule: Host(`members-beta.thun-tigers.net`) || Host(`members.thun-tigers.net`)
      entryPoints:
        - web
      service: tt-members

    tt-agenda:
      rule: Host(`agenda-beta.thun-tigers.net`) || Host(`agenda.thun-tigers.net`)
      entryPoints:
        - web
      service: tt-agenda

    tt-analytics:
      rule: Host(`analytics-beta.thun-tigers.net`) || Host(`analytics.thun-tigers.net`)
      entryPoints:
        - web
      service: tt-analytics

    tt-attendance:
      rule: Host(`attendance-beta.thun-tigers.net`) || Host(`attendance.thun-tigers.net`)
      entryPoints:
        - web
      service: tt-attendance

  services:
    tt-auth:
      loadBalancer:
        servers:
          - url: http://tt-auth:5000

    tt-members:
      loadBalancer:
        servers:
          - url: http://tt-members:5000

    tt-agenda:
      loadBalancer:
        servers:
          - url: http://tt-agenda:5000

    tt-analytics:
      loadBalancer:
        servers:
          - url: http://tt-analytics:5000

    tt-attendance:
      loadBalancer:
        servers:
          - url: http://tt-attendance:5000
